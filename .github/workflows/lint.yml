name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests \
            \( -name '*.cpp' -o -name '*.hpp' \) \
            -print0 \
          | xargs -0 clang-format --dry-run --Werror

      - name: Show diff on failure
        if: failure()
        run: |
          find src tests \
            \( -name '*.cpp' -o -name '*.hpp' \) \
            -print0 \
          | xargs -0 clang-format --dry-run 2>&1 \
          | head -100
          echo ""
          echo "Run the following locally to fix all files:"
          echo "  find src tests \( -name '*.cpp' -o -name '*.hpp' \) | xargs clang-format -i"
